name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          WALLET_ENCRYPTION_KEY: ${{ secrets.WALLET_ENCRYPTION_KEY }}
          BETTERSTACK_SOURCE_TOKEN: ${{ secrets.BETTERSTACK_SOURCE_TOKEN }}
          DOMAIN: ${{ secrets.DOMAIN }}
          ORIGIN_CERT: ${{ secrets.ORIGIN_CERT }}
          ORIGIN_KEY: ${{ secrets.ORIGIN_KEY }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: OPENROUTER_API_KEY,API_SPORTS_KEY,TURSO_DATABASE_URL,TURSO_AUTH_TOKEN,WALLET_ENCRYPTION_KEY,BETTERSTACK_SOURCE_TOKEN,GHCR_TOKEN,DOMAIN,ORIGIN_CERT,ORIGIN_KEY
          script: |
            set -e

            mkdir -p /opt/llm-betting
            printf '%s\n' \
              "OPENROUTER_API_KEY=$OPENROUTER_API_KEY" \
              "API_SPORTS_KEY=$API_SPORTS_KEY" \
              "TURSO_DATABASE_URL=$TURSO_DATABASE_URL" \
              "TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN" \
              "WALLET_ENCRYPTION_KEY=$WALLET_ENCRYPTION_KEY" \
              "NODE_ENV=production" \
              "PORT=3000" \
              > /opt/llm-betting/.env
            chmod 600 /opt/llm-betting/.env

            # Ensure firewall allows HTTP/HTTPS
            ufw allow 80/tcp >/dev/null 2>&1 || true
            ufw allow 443/tcp >/dev/null 2>&1 || true

            # Write Cloudflare Origin Certificate
            mkdir -p /opt/llm-betting/certs
            printf '%s' "$ORIGIN_CERT" > /opt/llm-betting/certs/cert.pem
            printf '%s' "$ORIGIN_KEY" > /opt/llm-betting/certs/key.pem
            chmod 644 /opt/llm-betting/certs/key.pem

            # Caddyfile using Origin Certificate (no ACME needed)
            printf '{\n\tauto_https off\n}\n\n%s:443 {\n\ttls /etc/caddy/certs/cert.pem /etc/caddy/certs/key.pem\n\treverse_proxy llm-betting:3000\n}\n' \
              "$DOMAIN" > /opt/llm-betting/Caddyfile

            # Install Vector log shipper (idempotent — skips if already running)
            if [ -n "$BETTERSTACK_SOURCE_TOKEN" ] && ! systemctl is-active --quiet vector; then
              curl -sSL "https://telemetry.betterstack.com/setup-vector/docker/$BETTERSTACK_SOURCE_TOKEN" \
                -o /tmp/setup-vector.sh && bash /tmp/setup-vector.sh
              usermod -aG docker vector || true
              systemctl restart vector
            fi

            # Authenticate with GHCR on the droplet to pull private images
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github --password-stdin

            # Create shared network
            docker network create llm-betting-net || true

            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop llm-betting || true
            docker rm llm-betting || true
            docker run -d \
              --name llm-betting \
              --restart unless-stopped \
              --network llm-betting-net \
              --env-file /opt/llm-betting/.env \
              ghcr.io/${{ github.repository }}:latest

            # Caddy — only recreate if not running or config changed
            docker pull caddy:2
            docker stop caddy || true
            docker rm caddy || true
            docker run -d \
              --name caddy \
              --restart unless-stopped \
              --network llm-betting-net \
              -p 80:80 \
              -p 443:443 \
              -e DOMAIN=$DOMAIN \
              -v /opt/llm-betting/Caddyfile:/etc/caddy/Caddyfile \
              -v /opt/llm-betting/certs:/etc/caddy/certs:ro \
              -v caddy_data:/data \
              caddy:2
