name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'deploy'
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: OPENROUTER_API_KEY,API_SPORTS_KEY,TURSO_DATABASE_URL,TURSO_AUTH_TOKEN,WALLET_ENCRYPTION_KEY
          script: |
            mkdir -p /opt/llm-betting
            cat > /opt/llm-betting/.env << EOF
            OPENROUTER_API_KEY=$OPENROUTER_API_KEY
            API_SPORTS_KEY=$API_SPORTS_KEY
            TURSO_DATABASE_URL=$TURSO_DATABASE_URL
            TURSO_AUTH_TOKEN=$TURSO_AUTH_TOKEN
            WALLET_ENCRYPTION_KEY=$WALLET_ENCRYPTION_KEY
            NODE_ENV=production
            PORT=3000
            EOF
            chmod 600 /opt/llm-betting/.env
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop llm-betting || true
            docker rm llm-betting || true
            docker run -d \
              --name llm-betting \
              --restart unless-stopped \
              --env-file /opt/llm-betting/.env \
              -p 3000:3000 \
              ghcr.io/${{ github.repository }}:latest
